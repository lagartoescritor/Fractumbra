<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodo Fractumbra | Archivo Desclasificado</title>
    <style>
        /* Importamos Fira Code, ideal para programadores y estética terminal */
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&display=swap');

        :root {
            --bg-color: #050505; /* Negro profundo */
            --text-main: #00ffcc; /* Celeste/verde pálido, estilo datos puros */
            --text-dim: #005544; /* Verde oscuro para sistema */
            --alert-color: #ff3366; /* Rojo/rosado para anomalías (El Limbo) */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            margin: 0;
            padding: 2rem 5%;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Efecto sutil de monitor antiguo (scanlines) */
        body::after {
            content: "";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* Pantalla de carga a pantalla completa */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 5rem 5%;
            box-sizing: border-box;
            transition: opacity 1s ease-out;
        }

        #boot-text p {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin: 0.5rem 0;
            min-height: 1.5rem;
        }

        .anomalia {
            color: var(--alert-color) !important;
            text-shadow: 0 0 8px rgba(255, 51, 102, 0.5);
        }

        .success-text {
            color: var(--text-main) !important;
        }

        /* Glitch para el año 2197 */
        .glitch-year {
            color: var(--alert-color);
            font-weight: bold;
            position: relative;
            display: inline-block;
            animation: glitch-anim 0.2s infinite;
            text-shadow: 2px 0 var(--text-main), -2px 0 blue;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 1px) }
            40% { transform: translate(2px, -1px) }
            60% { transform: translate(-1px, 2px) }
            80% { transform: translate(1px, -2px) }
            100% { transform: translate(0) }
        }

        /* Encabezado y Navegación */
        header {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--text-dim);
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .sys-status {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            line-height: 1.5;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            padding: 0.2rem 0.5rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .nav-links a:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
            text-shadow: none;
        }

        .nav-links a.limbo-link {
            color: var(--alert-color);
            opacity: 0.7;
        }

        .nav-links a.limbo-link:hover {
            background-color: var(--alert-color);
            color: var(--bg-color);
            opacity: 1;
        }

        /* Contenido principal y máquina de escribir */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-bottom: 15vh;
        }

        .terminal-text {
            font-size: 1.5rem;
            line-height: 1.8;
            max-width: 800px;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }

        .terminal-text p {
            margin: 0 0 1rem 0;
            min-height: 1.8rem;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.2rem;
            background-color: var(--text-main);
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Botón de acceso inicial */
        .access-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.8rem 1.5rem;
            border: 1px solid var(--text-main);
            background: transparent;
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0;
            transition: opacity 1s ease, background-color 0.3s ease;
        }

        .access-btn:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
        }

        .access-btn.visible {
            opacity: 1;
        }

        /* Responsividad */
        @media (max-width: 768px) {
            .nav-links { gap: 0.5rem; }
            .nav-links a { font-size: 0.8rem; }
            .terminal-text { font-size: 1.1rem; }
            #loading-screen { padding: 3rem 5%; }
        }
    </style>
</head>
<body>

    <!-- Pantalla de carga superpuesta -->
    <div id="loading-screen">
        <div id="boot-text"></div>
    </div>

    <!-- Contenido Principal -->
    <header>
        <div class="sys-status">
            <div id="sys-title">ESTADO: NODO AL-3 EN LÍNEA</div>
            <div id="sys-date">FECHA: --/--/----</div>
        </div>
        <nav class="nav-links">
            <a href="#">[ ARCHIVO DESCLASIFICADO ]</a>
            <a href="#">[ CÓDICE ]</a>
            <a href="#">[ BITÁCORA ]</a>
            <a href="#" class="limbo-link">[ ??? ]</a>
        </nav>
    </header>

    <main>
        <div class="terminal-text">
            <span id="typewriter-container"></span><span class="cursor"></span>
        </div>
        <div>
            <button class="access-btn" id="enter-btn">Entrar al Archivo</button>
        </div>
    </main>

    <script>
        // Función de utilidad para pausas (promesas)
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // --- SECUENCIA DE ARRANQUE (Pantalla de carga) ---
        const bootSequenceItems = [
            { text: "Estableciendo enlace con la red de Arytza", type: "normal" },
            { text: "Eludiendo firewall de seguridad", type: "normal" },
            { text: "Anomalía detectada. Interceptando flujo de datos", type: "alert" },
            { text: "Conexión segura establecida. Nodo AL-3 en línea.", type: "success" }
        ];

        async function runBootSequence() {
            const bootTextContainer = document.getElementById('boot-text');
            const loadingScreen = document.getElementById('loading-screen');

            for (let i = 0; i < bootSequenceItems.length; i++) {
                const item = bootSequenceItems[i];
                const p = document.createElement('p');
                
                if (item.type === 'alert') p.classList.add('anomalia');
                if (item.type === 'success') p.classList.add('success-text');
                
                bootTextContainer.appendChild(p);
                p.innerText = item.text;

                // Animación de los puntos suspensivos
                if (item.type === 'alert') {
                    // La anomalía es más rápida
                    await sleep(200); p.innerText = item.text + ".";
                    await sleep(200); p.innerText = item.text + "..";
                    await sleep(200); p.innerText = item.text + "...";
                    await sleep(400); // Pausa corta antes del siguiente
                } else if (item.type === 'normal') {
                    // Carga normal, un poco más lenta para crear suspenso
                    await sleep(600); p.innerText = item.text + ".";
                    await sleep(600); p.innerText = item.text + "..";
                    await sleep(600); p.innerText = item.text + "...";
                    await sleep(400); // Pausa antes de la siguiente línea
                } else {
                    // El mensaje de success (AL-3 en línea) se queda fijo un momento
                    await sleep(1200);
                }
            }

            // Termina la secuencia, desvanece la pantalla
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                startClock(); // Inicia el reloj glitcheado en el header
                setTimeout(typeWriter, 500); // Comienza el texto principal
            }, 1000);
        }

        // --- RELOJ Y GLITCH DEL AÑO 2197 ---
        function startClock() {
            const dateEl = document.getElementById('sys-date');
            
            setInterval(() => {
                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const currentYear = now.getFullYear();
                
                // Un 5% de probabilidad cada segundo de que ocurra el glitch a 2197
                if (Math.random() < 0.05) { 
                    dateEl.innerHTML = `FECHA LOCAL: ${day}/${month}/<span class="glitch-year">2197</span>`;
                    
                    // El glitch dura 300 milisegundos y vuelve a la normalidad
                    setTimeout(() => {
                         dateEl.innerHTML = `FECHA LOCAL: ${day}/${month}/${currentYear}`;
                    }, 300);
                } else {
                    dateEl.innerHTML = `FECHA LOCAL: ${day}/${month}/${currentYear}`;
                }
            }, 1000); // Se actualiza cada segundo
        }

        // --- EFECTO MÁQUINA DE ESCRIBIR (Contenido Principal) ---
        const linesToType = [
            "El tiempo es una ecuación imperfecta.",
            "Un ciclo que siempre se reinicia, disfrazado de progreso.",
            "Bienvenido al archivo desclasificado."
        ];
        
        const typeSpeed = 40; 
        const lineDelay = 800; 
        
        let currentLine = 0;
        let currentChar = 0;
        const container = document.getElementById('typewriter-container');
        const enterBtn = document.getElementById('enter-btn');

        function typeWriter() {
            if (currentLine < linesToType.length) {
                let text = linesToType[currentLine];
                
                if (currentChar < text.length) {
                    if (currentChar === 0 && currentLine > 0) {
                        container.innerHTML += "<br><br>";
                    }
                    container.innerHTML += text.charAt(currentChar);
                    currentChar++;
                    setTimeout(typeWriter, typeSpeed);
                } else {
                    currentLine++;
                    currentChar = 0;
                    setTimeout(typeWriter, lineDelay);
                }
            } else {
                enterBtn.classList.add('visible');
            }
        }

        // Iniciar la secuencia de carga al abrir la página
        window.onload = () => {
            runBootSequence();
        };
    </script>
</body>
</html>
